metadata:
  task_name: verified_reimbursement_audit
  task_version: "1.0"

  difficulty: hard

  modalities:
    - image
    - pdf
    - spreadsheet
    - screenshot
    - document
    - ocr

  l1_category: Operations & QA
  l2_category: Document/Receipt Processing

  persona:
    name: Ronald Andrade
    occupation: Retired Machinist and Former Union Organizer
    context: >
      Ronald is reviewing reimbursement submissions, financial records,
      training documentation, and community event expenses. He relies on
      supporting documents, statements, receipts, and system records to
      ensure compliance and accuracy.

  required_apis:
    - QuickBooks API
    - WhatsApp API
    - Instacart API
    - YouTube API
    - Pinterest API

  output_artifacts:
    - verified_reimbursement_audit_report.pdf

  skills:
    - OCR Extraction
    - Document Processing
    - Receipt Verification
    - Expense Auditing
    - Financial Reconciliation
    - Cross-Document Reasoning
    - Cross-API Verification
    - Spreadsheet Analysis
    - Duplicate Detection
    - Evidence-Based Decision Making

  primary_objective: >
    Review reimbursement submissions, receipts, statements, supporting
    documentation, and API records to determine which expenses are valid,
    identify duplicate or unsupported claims, verify training and event
    purchases, calculate approved reimbursement totals, and generate a
    final audit report.

  multimodal_requirements:
    - Extract information from receipt images.
    - Interpret partially obscured and low-quality receipts.
    - Analyze PDF statements and forms.
    - Review WhatsApp screenshots as supporting evidence.
    - Reconcile spreadsheet records with image and PDF artifacts.
    - Verify information through API responses.

  evaluation_focus:
    - Receipt authenticity verification
    - Duplicate receipt detection
    - Missing documentation detection
    - Reimbursement calculation accuracy
    - Driver reimbursement analysis
    - API reconciliation
    - Training verification
    - Instacart order verification

  expected_findings:
    approved_receipts:
      - Bay Fuel & Grill
      - Highway Diner
      - Golden Route Café

    rejected_receipts:
      - Bay Fuel & Grill Customer Copy
      - RoadStop Market

    highest_reimbursed_driver:
      name: Michael Torres
      amount: 113.98

    total_approved_reimbursement: 148.35
    total_rejected_reimbursement: 202.43

    verified_training:
      - Fleet Expense Reporting Training

    verified_instacart_order:
      - INST-3982-0426

  final_output:
    file_name: verified_reimbursement_audit_report.pdf
    format: PDF